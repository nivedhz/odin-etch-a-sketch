<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link href="style/style.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <div class="controls">
        <div class="color-picker-wrapper">
          <input
            type="color"
            name="color-picker"
            id="color-picker"
            value="#000000"
          />
          <p class="color-displayer" id="color-displayer">#000000</p>
        </div>
        <div class="buttons-wrapper">
          <div class="rgb-toggler-wrapper">
            <button id="rgb-button">Toggle RGB</button>
          </div>
          <div class="clear-wrapper">
            <button id="clear-button">Clear</button>
          </div>
          <div class="reset-wrapper">
            <button id="reset-button">Reset</button>
          </div>
        </div>
        <div class="size-slider-wrapper" id="size-slider-wrapper">
          <p id="size-displayer">14x14</p>
          <label for="size-slider-label"></label>
          <input
            type="range"
            name="size-slider-input"
            value="14"
            min="4"
            max="24"
            class="slider"
            id="size-slider"
          />
        </div>
      </div>
      <div id="grid-container" class="grid-container"></div>
    </div>

    <script src="script/script.js"></script>
  </body>
</html>
