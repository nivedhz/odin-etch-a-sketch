<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link href="style/style.css" rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <div class="controls">
        <div class="color-picker-wrapper">
          <input
            type="color"
            name="color-picker"
            id="color-picker"
            value="#000000"
          />
          <p class="color-displayer" id="color-displayer">#000000</p>
        </div>
        <div class="rgb-toggler-wrapper">
          <p class="rgb-info">RGB</p>
          <label for="" class="rgb-toggler-label">
            <input type="checkbox" id="rgb-toggler-input" />
            <span class="toggler"></span>
          </label>
        </div>
        <div class="size-slider-wrapper" id="size-slider-wrapper">
          <p class="size-displayer">
            <span id="value">14</span>x<span id="value">14</span>
          </p>
          <label for="size-slider"></label>
          <input
            type="range"
            name="size-slider-input"
            value="14"
            min="4"
            max="24"
            class="slider"
          />
        </div>
        <div class="buttons-wrapper">
          <div class="clear-wrapper">
            <button>Clear</button>
          </div>
          <div class="reset-wrapper">
            <button>Reset</button>
          </div>
        </div>
      </div>
      <div id="grid-container" class="grid-container"></div>
    </div>

    <script src="script/script.js"></script>
  </body>
</html>
